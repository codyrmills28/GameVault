name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Resolve version and tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$'; then
            echo "Invalid version '$VERSION' — expected semver like 0.1.0" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # GitHub's Windows runners check out on D: but the home dir is on C:. With
      # output:standalone, @vercel/nft globs C:\Users\runneradmin during the
      # trace and hits the deny-ACL "Application Data" junction -> EPERM, failing
      # the build. Building on the same drive as home (C:) avoids the cross-drive
      # glob. Copy excludes git/build artifacts; deps are installed fresh on C:.
      - name: Copy workspace to C drive (same drive as home)
        shell: pwsh
        run: |
          robocopy $env:GITHUB_WORKSPACE C:\rsbuild /E /XD .git node_modules .next dist /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -ge 8) { exit 1 } else { exit 0 }

      - name: Install dependencies
        working-directory: 'C:\rsbuild'
        run: npm ci

      - name: Set package version
        working-directory: 'C:\rsbuild'
        run: npm version ${{ steps.ver.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build Windows installer
        working-directory: 'C:\rsbuild'
        env:
          DATABASE_URL: file:./dev.db
        run: npm run electron:build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: false
          files: 'C:\rsbuild\dist\RealmSwap-Setup.exe'
